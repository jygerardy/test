<script src="/plugins/interactive-scoring/resource/dku-helpers.js"></script>
<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

<div class="main-container">
    <section class="left-block">
        <div class="block-header">
            <button class="main-blue-button scoring__button" id="scoring-button">Score</button>
            <h2>Features</h2>
            <hr>
        </div>
        <div class="block-body">
            <form action="" id="my-form">
                <div class="field field-selected-feature">
                    <label for="selected">Feature name</label>
                    <input type="text" id="selected" name="selected" placeholder="Type feature of interest">
                </div>
                <div class="field field-categorical">
<!--                     <label for="categorical">Feature type</label> -->
<!--                     <input type="checkbox" id="categorical" name="categorical"> -->
                    <label for="">Feature type</label>
                    <label>
                        <input type="radio" name="feature-type" id="feature-type" value="Numerical" checked>
                        Numerical
                    </label>
                    <label>
                        <input type="radio" name="feature-type" id="feature-type" value="Categorical">
                        Categorical
                    </label>
                </div>
                <div class="field field-counter-factuals">
                    <label for="counter-factuals">Variation in selected feature</label>
                    <textarea id='counter-factuals' name="counter-factuals" rows='2' placeholder='Comma-separated values or range with increment (eg 1,2,3 or 1-3)'></textarea>
                </div>
                <div class="field field-increment">
                    <label for="increment">Increment</label>
                    <input type="number" id="increment" name="increment" value="1">
                </div>
                <div class="field field-features">
                    <label for="features-field">JSON</label>
                    <textarea id='features-field' name="features-field" rows='15' cols=60 placeholder='{

    "feature1": value1,
    "feature2": value2,
    ...
}'></textarea>
                </div>
            </form>
        </div>
    </section>

    <div class="right-block">
        <div id="graph-container">
            <div class="graph-placeholder">Results will appear here</div>
        </div>
        <div id="text-output"></div>
    </div>
</div>
